name: Docker Release

on:
  push:
    tags:
      - "v*"
    paths-ignore:
      - "docs/**"
      - "**/*.md"
      - "**/*.mdx"
      - ".agents/**"
      - "skills/**"

concurrency:
  group: docker-release-push-${{ github.run_id }}
  cancel-in-progress: false

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: "true"
  REGISTRY: ghcr.io
  IMAGE_NAME: ${{ github.repository }}

jobs:
  # Build amd64 images (default + slim) with dependencies
  build-amd64:
    runs-on: ubuntu-24.04
    permissions:
      packages: write
      contents: read
    steps:
      - name: Checkout
        uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - name: Set up Docker Builder
        uses: docker/setup-buildx-action@v4

      - name: Login to GitHub Container Registry
        uses: docker/login-action@v4
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.repository_owner }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Resolve image tags (amd64)
        id: tags
        shell: bash
        env:
          IMAGE: ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}
          SOURCE_REF: ${{ github.ref }}
        run: |
          set -euo pipefail
          version="${SOURCE_REF#refs/tags/v}"
          echo "value=${IMAGE}:${version}-amd64" >> "$GITHUB_OUTPUT"
          echo "slim=${IMAGE}:${version}-slim-amd64" >> "$GITHUB_OUTPUT"

      - name: Build and push amd64 image (with deps)
        id: build
        uses: docker/build-push-action@v6
        with:
          context: .
          platforms: linux/amd64
          cache-from: type=gha,scope=docker-release-amd64
          cache-to: type=gha,mode=max,scope=docker-release-amd64
          build-args: |
            OPENCLAW_DOCKER_APT_PACKAGES=tmux ffmpeg jq
          tags: ${{ steps.tags.outputs.value }}
          provenance: false
          push: true

      - name: Build and push amd64 slim image (with deps)
        id: build-slim
        uses: docker/build-push-action@v6
        with:
          context: .
          platforms: linux/amd64
          cache-from: type=gha,scope=docker-release-amd64
          cache-to: type=gha,mode=max,scope=docker-release-amd64
          build-args: |
            OPENCLAW_DOCKER_APT_PACKAGES=tmux ffmpeg jq
            OPENCLAW_VARIANT=slim
          tags: ${{ steps.tags.outputs.slim }}
          provenance: false
          push: true
